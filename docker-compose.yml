version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: library_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: library
    ports:
      - "27017:27017"
    volumes:
      - mongo_lab4_data:/data/db

  web:
    build: .
    container_name: library_api_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mongodb://mongo_admin:password@db:27017
    depends_on:
      - db

volumes:
  mongo_lab4_data: