version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: library_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: library
    ports:
      - "27017:27017"
    volumes:
      - mongo_lab4_data:/data/db

  redis:
    image: redis:latest
    container_name: library_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: library_api_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mongodb://mongo_admin:password@db:27017
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  prism:
    image: stoplight/prism:4
    container_name: library_mock_api
    ports:
      - "4010:4010"
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml
    command: mock -h 0.0.0.0 -m false /tmp/openapi.yaml

volumes:
  mongo_lab4_data: